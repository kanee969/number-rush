<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07111F">
  <title>Number Rush | Start</title>
  <style>
    :root {
      --bg: #0F172A;
      --panel: rgba(30, 41, 59, 0.78);
      --ink: #F8FAFC;
      --muted: #94A3B8;
      --primary: #2563EB;
      --primary-bright: #3B82F6;
      --surface: #1E293B;
      --cell: #334155;
      --accent: #F59E0B;
      --accent-bright: #FBBF24;
      --tile-light: #DBEAFE;
      --tile-mid: #60A5FA;
      --tile-strong: #1D4ED8;
      --tile-gold: #FBBF24;
      --tile-hot: #F97316;
      --logo-cyan: #22D3EE;
      --logo-blue: #3B82F6;
      --logo-violet: #8B5CF6;
      --logo-pink: #EC4899;
      --line: rgba(248, 250, 252, 0.15);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100svh;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(37, 99, 235, 0.28), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(245, 158, 11, 0.18), transparent 22%),
        radial-gradient(circle at 50% 70%, rgba(51, 65, 85, 0.52), transparent 34%),
        linear-gradient(145deg, var(--bg) 0%, #111C31 52%, #070B14 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(248, 250, 252, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(248, 250, 252, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent 78%);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto -8vw -18vh -8vw;
      height: 58vh;
      background:
        linear-gradient(180deg, transparent, rgba(15, 23, 42, 0.62)),
        repeating-linear-gradient(90deg, transparent 0 72px, rgba(248, 250, 252, 0.08) 72px 74px),
        repeating-linear-gradient(0deg, transparent 0 72px, rgba(248, 250, 252, 0.08) 72px 74px);
      transform: perspective(620px) rotateX(58deg);
      transform-origin: bottom;
      pointer-events: none;
    }

    .page {
      position: relative;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 20px;
      overflow: hidden;
      isolation: isolate;
    }

    .halo {
      position: absolute;
      width: min(86vw, 760px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(34, 211, 238, 0.15);
      background:
        radial-gradient(circle, rgba(37, 99, 235, 0.14), transparent 46%),
        conic-gradient(from 120deg, transparent, rgba(37, 99, 235, 0.24), transparent, rgba(245, 158, 11, 0.22), transparent);
      filter: blur(0.2px);
      animation: rotate-halo 18s linear infinite;
      z-index: -1;
    }

    .backdrop-lines {
      position: absolute;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .backdrop-lines::before,
    .backdrop-lines::after {
      content: "";
      position: absolute;
      width: 58vw;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.62), rgba(245, 158, 11, 0.42), transparent);
      filter: blur(0.4px);
      opacity: 0.8;
      transform: rotate(-18deg);
    }

    .backdrop-lines::before {
      top: 24%;
      left: -12%;
    }

    .backdrop-lines::after {
      right: -10%;
      bottom: 25%;
      transform: rotate(-18deg);
    }

    .game-backdrop {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .game-backdrop::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(72vw, 620px);
      aspect-ratio: 1;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(248, 250, 252, 0.1) 1px, transparent 1px),
        linear-gradient(180deg, rgba(248, 250, 252, 0.1) 1px, transparent 1px),
        linear-gradient(145deg, rgba(37, 99, 235, 0.2), rgba(245, 158, 11, 0.12));
      background-size: 25% 25%, 25% 25%, 100% 100%;
      box-shadow:
        0 0 0 1px rgba(248, 250, 252, 0.08) inset,
        0 38px 120px rgba(37, 99, 235, 0.2);
      opacity: 0.34;
      transform: translate(-50%, -50%) rotate(18deg) skew(-8deg);
      filter: blur(0.2px);
    }

    .game-backdrop::after {
      content: "";
      position: absolute;
      inset: 8%;
      background:
        radial-gradient(circle at 22% 34%, rgba(251, 191, 36, 0.2), transparent 9%),
        radial-gradient(circle at 72% 28%, rgba(96, 165, 250, 0.26), transparent 10%),
        radial-gradient(circle at 56% 70%, rgba(37, 99, 235, 0.2), transparent 11%),
        linear-gradient(115deg, transparent 0 18%, rgba(248, 250, 252, 0.16) 19%, transparent 20% 52%, rgba(245, 158, 11, 0.18) 53%, transparent 54%);
      opacity: 0.74;
      filter: blur(1px);
      animation: ambient-sweep 5600ms ease-in-out infinite;
    }

    .light-trail {
      position: absolute;
      width: min(72vw, 660px);
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.84), rgba(251, 191, 36, 0.74), transparent);
      box-shadow: 0 0 26px rgba(37, 99, 235, 0.42);
      opacity: 0.72;
      transform: rotate(-22deg);
      animation: trail-glide 6200ms ease-in-out infinite;
    }

    .light-trail.t1 {
      left: -8%;
      top: 30%;
    }

    .light-trail.t2 {
      right: -10%;
      bottom: 29%;
      transform: rotate(-22deg);
      animation-delay: -2300ms;
    }

    .shell {
      width: min(100%, 840px);
      min-height: min(88svh, 720px);
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(24px, 5vh, 48px);
      padding: clamp(22px, 5vw, 46px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent 32%),
        linear-gradient(180deg, rgba(30, 41, 59, 0.88), rgba(15, 23, 42, 0.78));
      box-shadow: var(--shadow), 0 0 0 1px rgba(37, 99, 235, 0.12) inset;
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.11), transparent),
        repeating-linear-gradient(180deg, rgba(248, 250, 252, 0.035) 0 1px, transparent 1px 8px);
      opacity: 0.7;
      pointer-events: none;
    }

    .topline {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(37, 99, 235, 0.34);
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.12);
      color: #DBEAFE;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-bright);
      box-shadow: 0 0 16px rgba(245, 158, 11, 0.9);
    }

    .hero {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 24px;
    }

    .mark {
      width: min(78vw, 420px);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
      filter:
        drop-shadow(0 28px 60px rgba(34, 211, 238, 0.28))
        drop-shadow(0 18px 44px rgba(236, 72, 153, 0.2));
      animation: logo-float 3600ms ease-in-out infinite;
    }

    .mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    h1 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(1.85rem, 7vw, 3.7rem);
      line-height: 0.94;
      letter-spacing: 0;
      font-weight: 950;
      text-transform: uppercase;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }

    h1 span {
      display: block;
    }

    h1 .number {
      color: transparent;
      background:
        linear-gradient(90deg, var(--logo-cyan) 0%, var(--logo-blue) 48%, var(--logo-violet) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 14px 26px rgba(59, 130, 246, 0.24));
    }

    h1 .rush {
      color: transparent;
      background:
        linear-gradient(90deg, var(--logo-blue) 0%, var(--logo-violet) 42%, var(--logo-pink) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 14px 26px rgba(236, 72, 153, 0.24));
    }

    .digits {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .digit {
      position: absolute;
      color: rgba(248, 250, 252, 0.16);
      font-weight: 950;
      line-height: 1;
      animation: float 4200ms ease-in-out infinite;
      text-shadow: 0 0 24px rgba(34, 211, 238, 0.24);
    }

    .d1 { left: 7%; top: 26%; font-size: clamp(3rem, 10vw, 5.5rem); color: rgba(37, 99, 235, 0.32); }
    .d2 { right: 10%; top: 22%; font-size: clamp(2.7rem, 9vw, 5rem); color: rgba(245, 158, 11, 0.28); animation-delay: -800ms; }
    .d3 { left: 12%; bottom: 22%; font-size: clamp(2.8rem, 9vw, 5.2rem); color: rgba(251, 191, 36, 0.26); animation-delay: -1400ms; }
    .d4 { right: 12%; bottom: 18%; font-size: clamp(3.3rem, 11vw, 6rem); color: rgba(37, 99, 235, 0.24); animation-delay: -1900ms; }
    .d5 { left: 48%; bottom: 10%; font-size: clamp(2.2rem, 8vw, 4.2rem); animation-delay: -2600ms; }

    .actions {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    .start {
      position: relative;
      width: min(100%, 540px);
      min-height: 68px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(248, 250, 252, 0.22);
      border-radius: 8px;
      color: #FFFFFF;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.7), transparent 15%),
        linear-gradient(100deg, var(--logo-cyan) 0%, var(--logo-blue) 34%, var(--logo-violet) 68%, var(--logo-pink) 100%);
      text-decoration: none;
      font-size: clamp(1.25rem, 5vw, 2rem);
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(15, 23, 42, 0.2);
      box-shadow:
        0 18px 44px rgba(59, 130, 246, 0.28),
        0 0 34px rgba(236, 72, 153, 0.18),
        0 0 0 1px rgba(248, 250, 252, 0.28) inset;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      animation: cta-pulse 2400ms ease-in-out infinite;
    }

    .start::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.72) 44%, transparent 66%);
      transform: translateX(-130%);
      animation: cta-shine 3000ms ease-in-out infinite;
    }

    .start:hover {
      transform: translateY(-3px);
      filter: saturate(1.15);
      box-shadow:
        0 24px 58px rgba(34, 211, 238, 0.34),
        0 0 38px rgba(236, 72, 153, 0.32),
        0 0 0 1px rgba(248, 250, 252, 0.36) inset;
    }

    .start:active {
      transform: translateY(0) scale(0.98);
    }

    .start span {
      position: relative;
      z-index: 1;
    }

    .hint {
      margin: 0;
      color: rgba(248, 250, 252, 0.54);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ripple {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      transform: translate(-50%, -50%) scale(0);
      animation: ripple 620ms ease-out forwards;
      pointer-events: none;
    }

    @keyframes rotate-halo {
      to { transform: rotate(360deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-18px) rotate(2deg); }
    }

    @keyframes logo-float {
      0%, 100% {
        transform: translateY(0) scale(1);
        filter:
          drop-shadow(0 28px 60px rgba(34, 211, 238, 0.28))
          drop-shadow(0 18px 44px rgba(236, 72, 153, 0.2));
      }
      50% {
        transform: translateY(-10px) scale(1.025);
        filter:
          drop-shadow(0 34px 72px rgba(34, 211, 238, 0.36))
          drop-shadow(0 22px 54px rgba(236, 72, 153, 0.28));
      }
    }

    @keyframes ambient-sweep {
      0%, 100% { transform: translateY(0); opacity: 0.58; }
      50% { transform: translateY(-16px); opacity: 0.86; }
    }

    @keyframes trail-glide {
      0%, 100% { translate: 0 0; opacity: 0.46; }
      50% { translate: 34px -14px; opacity: 0.86; }
    }

    @keyframes cta-pulse {
      0%, 100% { box-shadow: 0 18px 44px rgba(59, 130, 246, 0.26), 0 0 30px rgba(236, 72, 153, 0.16), 0 0 0 1px rgba(248, 250, 252, 0.24) inset; }
      50% { box-shadow: 0 24px 60px rgba(34, 211, 238, 0.32), 0 0 38px rgba(236, 72, 153, 0.28), 0 0 0 1px rgba(248, 250, 252, 0.36) inset; }
    }

    @keyframes cta-shine {
      0%, 42% { opacity: 0; transform: translateX(-130%); }
      55% { opacity: 1; }
      80%, 100% { opacity: 0; transform: translateX(130%); }
    }

    @keyframes ripple {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(22);
      }
    }

    @media (max-width: 620px) {
      .shell {
        min-height: 90svh;
        padding: 20px;
      }

      .topline {
        font-size: 0.68rem;
      }

      .d1,
      .d2 {
        top: 34%;
      }

      .game-backdrop::before {
        width: 95vw;
        opacity: 0.25;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Number Rush start page">
    <div class="halo" aria-hidden="true"></div>
    <div class="backdrop-lines" aria-hidden="true"></div>
    <div class="game-backdrop" aria-hidden="true">
      <div class="light-trail t1"></div>
      <div class="light-trail t2"></div>
    </div>

    <section class="shell">
      <div class="digits" aria-hidden="true">
        <div class="digit d1">2</div>
        <div class="digit d2">4</div>
        <div class="digit d3">8</div>
        <div class="digit d4">16</div>
        <div class="digit d5">32</div>
      </div>

      <header class="topline">
        <span class="badge">Fast Merge</span>
        <span>Ready to Rush</span>
      </header>

      <section class="hero">
        <div class="mark">
          <img src="number-rush-logo.png" alt="Number Rush logo">
        </div>
        <div>
          <h1>
            <span class="number">Merge Fast</span>
            <span class="rush">Rise Higher</span>
          </h1>
        </div>
      </section>

      <div class="actions">
        <a class="start" href="https://kanee969.github.io/number-rush/" aria-label="Start Number Rush game">
          <span>START GAME</span>
        </a>
        <p class="hint">Tap to launch</p>
      </div>
    </section>
  </main>

  <script>
    document.querySelector(".start").addEventListener("pointerdown", function (event) {
      var link = event.currentTarget;
      var rect = link.getBoundingClientRect();
      var ripple = document.createElement("span");
      ripple.className = "ripple";
      ripple.style.left = (event.clientX - rect.left) + "px";
      ripple.style.top = (event.clientY - rect.top) + "px";
      link.appendChild(ripple);
      ripple.addEventListener("animationend", function () {
        ripple.remove();
      }, { once: true });
    });
  </script>
</body>
</html>
