<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F172A">
  <title>Number Rush</title>
  <style>
    :root {
      --primary-dark: #0F172A;
      --primary: #2563EB;
      --accent: #F59E0B;
      --surface: #1E293B;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --cell: #334155;
      --line: rgba(248, 250, 252, 0.08);
      --glow-blue: rgba(37, 99, 235, 0.34);
      --glow-gold: rgba(245, 158, 11, 0.3);
      --gap: clamp(8px, 2.5vw, 12px);
      --radius: 8px;
      --board-size: min(92vw, 420px);
      --tile-size: calc((var(--board-size) - (var(--gap) * 5)) / 4);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: var(--primary-dark);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.18), transparent 34%),
        linear-gradient(315deg, rgba(245, 158, 11, 0.14), transparent 30%),
        repeating-linear-gradient(135deg, rgba(248, 250, 252, 0.045) 0 1px, transparent 1px 18px),
        var(--primary-dark);
    }

    body {
      display: flex;
      justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    .game {
      width: min(100%, 480px);
      min-height: calc(100svh - 28px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      position: relative;
      width: clamp(52px, 15vw, 68px);
      height: clamp(52px, 15vw, 68px);
      flex: 0 0 auto;
      border: 1px solid rgba(248, 250, 252, 0.14);
      border-radius: 8px;
      box-shadow: 0 16px 34px var(--glow-blue), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      overflow: hidden;
      object-fit: cover;
      background: var(--surface);
    }

    .brand-copy {
      min-width: 0;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.55rem, 8.8vw, 2.85rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      white-space: nowrap;
    }

    .brand-tag {
      display: block;
      margin-top: 6px;
      color: var(--accent);
      font-size: clamp(0.68rem, 2.7vw, 0.8rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .scores {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .score-card {
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.055), transparent),
        var(--surface);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18), inset 3px 0 0 rgba(37, 99, 235, 0.82);
    }

    .score-card:nth-child(2) {
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18), inset 3px 0 0 rgba(245, 158, 11, 0.88);
    }

    .score-label {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-value {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.35rem, 6vw, 2rem);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .restart {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #FBBF24, var(--accent));
      color: #111827;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(245, 158, 11, 0.24);
    }

    .restart:active {
      transform: translateY(1px) scale(0.98);
    }

    .restart svg {
      width: 23px;
      height: 23px;
      stroke-width: 2.6;
    }

    .board-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .board {
      position: relative;
      width: var(--board-size);
      height: var(--board-size);
      padding: var(--gap);
      border: 1px solid rgba(248, 250, 252, 0.1);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.06), transparent),
        linear-gradient(135deg, rgba(37, 99, 235, 0.16), rgba(245, 158, 11, 0.07)),
        var(--surface);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32), 0 0 0 1px rgba(37, 99, 235, 0.13);
      touch-action: none;
      user-select: none;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      width: 100%;
      height: 100%;
    }

    .cell {
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(15, 23, 42, 0.12), rgba(248, 250, 252, 0.035)),
        var(--cell);
      box-shadow: inset 0 1px 0 rgba(248, 250, 252, 0.04);
    }

    .tile-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      left: calc(var(--gap) + (var(--x) * (var(--tile-size) + var(--gap))));
      top: calc(var(--gap) + (var(--y) * (var(--tile-size) + var(--gap))));
      width: var(--tile-size);
      height: var(--tile-size);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      background: var(--tile-bg, #475569);
      color: var(--tile-color, var(--text));
      font-size: clamp(1.25rem, 8vw, 2.35rem);
      font-weight: 900;
      line-height: 1;
      transition: left 140ms ease, top 140ms ease, transform 140ms ease, opacity 140ms ease;
      will-change: left, top, transform;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .tile[data-value="128"],
    .tile[data-value="256"],
    .tile[data-value="512"] {
      font-size: clamp(1.05rem, 6.5vw, 1.95rem);
    }

    .tile[data-value="1024"],
    .tile[data-value="2048"] {
      font-size: clamp(0.88rem, 5.5vw, 1.65rem);
    }

    .tile.new {
      animation: appear 170ms ease both;
    }

    .tile.merged {
      animation: merge-pop 210ms ease both;
      z-index: 2;
    }

    .controls {
      display: grid;
      grid-template-columns: 58px 58px 58px;
      grid-template-rows: 58px 58px;
      justify-content: center;
      gap: 8px;
      padding-top: 2px;
    }

    .move-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(248, 250, 252, 0.08);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.055), transparent),
        #162238;
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
    }

    .move-btn:active {
      transform: translateY(1px) scale(0.98);
      background: var(--primary);
    }

    .move-btn svg {
      width: 25px;
      height: 25px;
      stroke-width: 2.8;
    }

    .move-up { grid-column: 2; grid-row: 1; }
    .move-left { grid-column: 1; grid-row: 2; }
    .move-down { grid-column: 2; grid-row: 2; }
    .move-right { grid-column: 3; grid-row: 2; }

    .copyright {
      margin: 0;
      color: rgba(248, 250, 252, 0.58);
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .copyright strong {
      color: var(--accent);
      font-weight: 900;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(10px);
    }

    .modal.show {
      display: flex;
      animation: fade-in 160ms ease both;
    }

    .modal-card {
      width: min(100%, 340px);
      padding: 24px;
      border: 1px solid rgba(248, 250, 252, 0.1);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.06), transparent),
        var(--surface);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    }

    .modal-card h2 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .modal-card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .primary-btn {
      min-height: 48px;
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #3B82F6, var(--primary));
      color: var(--text);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.28);
    }

    .primary-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
      background:
        linear-gradient(180deg, #3B82F6 0%, #60A5FA 48%, #93C5FD 100%);
      color: #F8FAFC;
      transition: opacity 260ms ease, transform 260ms ease, visibility 260ms ease;
    }

    .intro.hide {
      opacity: 0;
      transform: scale(1.03);
      visibility: hidden;
      pointer-events: none;
    }

    .intro-cloud {
      position: absolute;
      width: 140px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      filter: blur(1px);
      opacity: 0.82;
      animation: intro-cloud-move 24s linear infinite;
    }

    .intro-cloud::before,
    .intro-cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .intro-cloud::before {
      width: 68px;
      height: 68px;
      left: 18px;
      top: -28px;
    }

    .intro-cloud::after {
      width: 78px;
      height: 78px;
      right: 16px;
      top: -36px;
    }

    .intro-cloud.one {
      top: 9%;
      left: -180px;
    }

    .intro-cloud.two {
      top: 24%;
      left: -260px;
      width: 200px;
      height: 54px;
      animation-duration: 34s;
      animation-delay: -10s;
      opacity: 0.7;
    }

    .intro-road {
      position: absolute;
      bottom: -1px;
      left: 50%;
      width: min(94vw, 860px);
      height: 76vh;
      transform: translateX(-50%);
      clip-path: polygon(22% 0, 78% 0, 100% 100%, 0 100%);
      background:
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0 34px, rgba(226, 232, 240, 0.95) 34px 68px);
      box-shadow:
        0 0 0 12px rgba(168, 85, 247, 0.92) inset,
        0 -18px 60px rgba(15, 23, 42, 0.2);
    }

    .intro-road::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 47%, rgba(15, 23, 42, 0.18) 48% 52%, transparent 53%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), transparent 34%);
    }

    .intro-content {
      position: relative;
      z-index: 2;
      width: min(100%, 720px);
      min-height: min(86svh, 760px);
      display: grid;
      align-content: space-between;
      justify-items: center;
      gap: 24px;
      text-align: center;
    }

    .intro-logo {
      margin-top: clamp(22px, 7vh, 72px);
      filter: drop-shadow(6px 8px 0 rgba(13, 60, 159, 0.72));
      animation: intro-logo-pulse 2800ms ease-in-out infinite;
    }

    .intro-logo span {
      display: block;
      font-weight: 950;
      line-height: 0.86;
      letter-spacing: 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .intro-logo .top {
      font-size: clamp(3.2rem, 16vw, 6.6rem);
      background-image: linear-gradient(90deg, #FF66B3, #FFCF5C);
    }

    .intro-logo .bottom {
      font-size: clamp(3.8rem, 19vw, 7.8rem);
      background-image: linear-gradient(90deg, #2DD4BF, #D9F99D);
    }

    .intro-number {
      position: absolute;
      z-index: 1;
      font-weight: 950;
      line-height: 1;
      text-shadow: 0 8px 0 rgba(15, 23, 42, 0.12);
      animation: intro-float 3600ms ease-in-out infinite;
    }

    .intro-number.n1 { left: 8%; bottom: 24%; color: #8B5CF6; font-size: clamp(4rem, 16vw, 7rem); }
    .intro-number.n2 { left: 40%; bottom: 20%; color: #2563EB; font-size: clamp(4.5rem, 18vw, 7.8rem); animation-delay: -900ms; }
    .intro-number.n3 { right: 8%; bottom: 25%; color: #65D900; font-size: clamp(4rem, 16vw, 7rem); animation-delay: -1400ms; }
    .intro-number.n4 { left: 24%; bottom: 43%; color: #FACC15; font-size: clamp(3rem, 12vw, 5.7rem); animation-delay: -500ms; }
    .intro-number.n5 { right: 36%; bottom: 44%; color: #EF4444; font-size: clamp(3rem, 12vw, 5.7rem); animation-delay: -1600ms; }
    .intro-number.n6 { right: 19%; bottom: 42%; color: #8B5CF6; font-size: clamp(3rem, 12vw, 5.7rem); animation-delay: -1100ms; }

    .start-game {
      position: relative;
      z-index: 3;
      width: min(100%, 700px);
      min-height: 72px;
      margin-bottom: clamp(14px, 4vh, 42px);
      border: 0;
      border-radius: 8px;
      overflow: hidden;
      color: #FFFFFF;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.8), transparent 16%),
        linear-gradient(90deg, #06B6D4, #84CC16);
      font-size: clamp(1.65rem, 7vw, 2.5rem);
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(15, 23, 42, 0.18);
      cursor: pointer;
      box-shadow:
        0 18px 42px rgba(15, 23, 42, 0.28),
        0 0 0 1px rgba(255, 255, 255, 0.34) inset;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      animation: intro-button-pulse 2200ms ease-in-out infinite;
    }

    .start-game::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent, rgba(255, 255, 255, 0.58), transparent);
      transform: translateX(-120%);
      animation: intro-button-shine 2800ms ease-in-out infinite;
    }

    .start-game:hover {
      transform: translateY(-3px);
      filter: saturate(1.12);
      box-shadow:
        0 24px 54px rgba(15, 23, 42, 0.32),
        0 0 28px rgba(255, 255, 255, 0.42),
        0 0 0 1px rgba(255, 255, 255, 0.42) inset;
    }

    .start-game:active {
      transform: translateY(0) scale(0.98);
    }

    .start-game .ripple {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.62);
      transform: translate(-50%, -50%) scale(0);
      animation: intro-ripple 620ms ease-out forwards;
      pointer-events: none;
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.45); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes merge-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.14); }
      100% { transform: scale(1); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes intro-cloud-move {
      from { transform: translateX(0); }
      to { transform: translateX(130vw); }
    }

    @keyframes intro-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    @keyframes intro-logo-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes intro-button-pulse {
      0%, 100% { box-shadow: 0 18px 42px rgba(15, 23, 42, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.34) inset; }
      50% { box-shadow: 0 20px 54px rgba(132, 204, 22, 0.34), 0 0 32px rgba(255, 255, 255, 0.44), 0 0 0 1px rgba(255, 255, 255, 0.44) inset; }
    }

    @keyframes intro-button-shine {
      0%, 42% { transform: translateX(-120%); opacity: 0; }
      56% { opacity: 1; }
      78%, 100% { transform: translateX(120%); opacity: 0; }
    }

    @keyframes intro-ripple {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(24);
      }
    }

    @media (max-height: 680px) {
      .game {
        justify-content: flex-start;
        gap: 12px;
      }

      h1 {
        font-size: clamp(1.45rem, 8vw, 2.45rem);
      }

      .brand-icon {
        width: 50px;
        height: 50px;
      }

      .score-card {
        padding: 10px 12px;
      }

      .controls {
        grid-template-columns: 50px 50px 50px;
        grid-template-rows: 50px 50px;
      }

      .intro-content {
        min-height: 90svh;
      }

      .intro-logo {
        margin-top: 8px;
      }

      .start-game {
        min-height: 62px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <section class="intro" id="introScreen" aria-label="Number Rush start screen">
    <div class="intro-cloud one" aria-hidden="true"></div>
    <div class="intro-cloud two" aria-hidden="true"></div>
    <div class="intro-road" aria-hidden="true"></div>
    <div class="intro-number n1" aria-hidden="true">4</div>
    <div class="intro-number n2" aria-hidden="true">2</div>
    <div class="intro-number n3" aria-hidden="true">3</div>
    <div class="intro-number n4" aria-hidden="true">5</div>
    <div class="intro-number n5" aria-hidden="true">8</div>
    <div class="intro-number n6" aria-hidden="true">7</div>
    <div class="intro-content">
      <h2 class="intro-logo" aria-label="Number Rush">
        <span class="top">NUMBER</span>
        <span class="bottom">RUSH</span>
      </h2>
      <button class="start-game" id="startGameButton" type="button">START GAME</button>
    </div>
  </section>

  <main class="game" aria-label="Number Rush game">
    <section class="topbar">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
      </button>
    </nav>

    <p class="copyright">All rights reserved for <strong>kanee</strong></p>
  </main>

  <div class="modal" id="gameOverModal" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
    <div class="modal-card">
      <h2 id="gameOverTitle">Game Over</h2>
      <p>No more moves. Your final score is <strong id="finalScore">0</strong>.</p>
      <button class="primary-btn" type="button" data-restart>Restart</button>
    </div>
  </div>

  <div class="modal" id="winModal" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="modal-card">
      <h2 id="winTitle">You Win</h2>
      <p>You reached 2048. Keep rushing for a higher score.</p>
      <button class="primary-btn" type="button" data-restart>Play Again</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var SIZE = 4;
      var WIN_VALUE = 2048;
      var STORAGE_KEY = "numberRushBestScore";
      var board = document.getElementById("board");
      var tileLayer = document.getElementById("tileLayer");
      var scoreEl = document.getElementById("score");
      var bestScoreEl = document.getElementById("bestScore");
      var finalScoreEl = document.getElementById("finalScore");
      var gameOverModal = document.getElementById("gameOverModal");
      var winModal = document.getElementById("winModal");
      var restartButton = document.getElementById("restartButton");
      var introScreen = document.getElementById("introScreen");
      var startGameButton = document.getElementById("startGameButton");

      var grid = [];
      var tiles = [];
      var nextTileId = 1;
      var score = 0;
      var bestScore = readBestScore();
      var hasWon = false;
      var gameReady = false;
      var locked = false;
      var touchStartX = 0;
      var touchStartY = 0;
      var suppressClickUntil = 0;

      var tileColors = {
        2: ["#DBEAFE", "#0F172A"],
        4: ["#BFDBFE", "#0F172A"],
        8: ["#93C5FD", "#0F172A"],
        16: ["#60A5FA", "#0F172A"],
        32: ["#2563EB", "#F8FAFC"],
        64: ["#1D4ED8", "#F8FAFC"],
        128: ["#FDE68A", "#0F172A"],
        256: ["#FBBF24", "#0F172A"],
        512: ["#F59E0B", "#111827"],
        1024: ["#F97316", "#F8FAFC"],
        2048: ["#EF4444", "#F8FAFC"]
      };

      /** Create a fresh board with two random starting tiles. */
      function startGame() {
        grid = createEmptyGrid();
        tiles = [];
        nextTileId = 1;
        score = 0;
        hasWon = false;
        locked = false;
        closeModals();
        resetRenderLayer();
        addRandomTile();
        addRandomTile();
        updateScore();
        render();
      }

      /** Build the internal 4x4 matrix. */
      function createEmptyGrid() {
        var next = [];
        for (var y = 0; y < SIZE; y += 1) {
          next[y] = [];
          for (var x = 0; x < SIZE; x += 1) {
            next[y][x] = null;
          }
        }
        return next;
      }

      /** Place a 2 or 4 in a random empty cell. */
      function addRandomTile() {
        var empty = [];
        for (var y = 0; y < SIZE; y += 1) {
          for (var x = 0; x < SIZE; x += 1) {
            if (grid[y][x] === null) {
              empty.push({ x: x, y: y });
            }
          }
        }

        if (!empty.length) {
          return;
        }

        var cell = empty[Math.floor(Math.random() * empty.length)];
        var tile = {
          id: nextTileId,
          value: Math.random() < 0.9 ? 2 : 4,
          x: cell.x,
          y: cell.y,
          isNew: true,
          merged: false
        };
        nextTileId += 1;
        tiles.push(tile);
        grid[cell.y][cell.x] = tile;
      }

      /** Draw or update tile elements while preserving movement transitions. */
      function render() {
        var activeIds = {};

        tiles.forEach(function (tile) {
          activeIds[tile.id] = true;
          var element = tileLayer.querySelector('[data-id="' + tile.id + '"]');
          var colors = tileColors[tile.value] || ["#111827", "#F8FAFC"];

          if (!element) {
            element = document.createElement("div");
            element.dataset.id = tile.id;
            tileLayer.appendChild(element);
          }

          element.className = "tile" + (tile.isNew ? " new" : "") + (tile.merged ? " merged" : "");
          element.dataset.value = tile.value;
          element.textContent = tile.value;
          element.style.setProperty("--x", tile.x);
          element.style.setProperty("--y", tile.y);
          element.style.setProperty("--tile-bg", colors[0]);
          element.style.setProperty("--tile-color", colors[1]);
          tile.isNew = false;
          tile.merged = false;
        });

        Array.prototype.slice.call(tileLayer.children).forEach(function (element) {
          if (!activeIds[Number(element.dataset.id)]) {
            element.remove();
          }
        });
      }

      /** Clear all rendered tiles for a visually fresh restart. */
      function resetRenderLayer() {
        while (tileLayer.firstChild) {
          tileLayer.removeChild(tileLayer.firstChild);
        }
      }

      /** Slide and merge tiles in the requested direction. */
      function move(direction) {
        if (!gameReady || locked) {
          return;
        }

        var result = getMovedGrid(direction);

        if (!result.changed) {
          return;
        }

        locked = true;
        applyMove(result);
        score += result.points;
        updateScore();
        render();
        addRandomTile();
        setTimeout(render, 145);

        if (!hasWon && containsValue(WIN_VALUE)) {
          hasWon = true;
          setTimeout(function () {
            showModal(winModal);
          }, 220);
        } else if (isGameOver()) {
          setTimeout(function () {
            finalScoreEl.textContent = score;
            showModal(gameOverModal);
          }, 220);
        }

        setTimeout(function () {
          locked = false;
        }, 180);
      }

      /** Calculate the next grid for a move without mutating until valid. */
      function getMovedGrid(direction) {
        var next = createEmptyGrid();
        var points = 0;
        var changed = false;
        var operations = [];

        for (var i = 0; i < SIZE; i += 1) {
          var line = readLine(direction, i);
          var merged = mergeLine(line.values);
          points += merged.points;

          for (var j = 0; j < SIZE; j += 1) {
            var pos = getPosition(direction, i, j);
            var tile = merged.tiles[j];
            next[pos.y][pos.x] = tile;

            if (grid[pos.y][pos.x] !== tile) {
              changed = true;
            }

            if (tile) {
              operations.push({
                tile: tile,
                x: pos.x,
                y: pos.y,
                value: merged.values[j],
                mergedWith: merged.mergedWith[j] || null
              });
            }
          }
        }

        return {
          grid: next,
          points: points,
          changed: changed,
          operations: operations
        };
      }

      /** Compress one row or column and combine equal neighbors once. */
      function mergeLine(lineTiles) {
        var compact = lineTiles.filter(function (tile) {
          return tile !== null;
        });
        var resultTiles = [];
        var resultValues = [];
        var mergedWith = {};
        var points = 0;

        for (var i = 0; i < compact.length; i += 1) {
          if (compact[i + 1] && compact[i].value === compact[i + 1].value) {
            var combined = compact[i].value * 2;
            resultTiles.push(compact[i]);
            resultValues.push(combined);
            mergedWith[resultTiles.length - 1] = compact[i + 1];
            points += combined;
            i += 1;
          } else {
            resultTiles.push(compact[i]);
            resultValues.push(compact[i].value);
          }
        }

        while (resultTiles.length < SIZE) {
          resultTiles.push(null);
          resultValues.push(0);
        }

        return {
          tiles: resultTiles,
          values: resultValues,
          mergedWith: mergedWith,
          points: points
        };
      }

      /** Commit a valid move, update tile positions, and remove merged tiles. */
      function applyMove(result) {
        tiles.forEach(function (tile) {
          tile.isNew = false;
          tile.merged = false;
          tile.remove = false;
        });

        result.operations.forEach(function (operation) {
          operation.tile.x = operation.x;
          operation.tile.y = operation.y;
          operation.tile.value = operation.value;
          if (operation.mergedWith) {
            operation.tile.merged = true;
            operation.mergedWith.x = operation.x;
            operation.mergedWith.y = operation.y;
            operation.mergedWith.remove = true;
          }
        });

        grid = result.grid;
        tiles = tiles.filter(function (tile) {
          return !tile.remove;
        });
      }

      /** Read a row or column in the movement order. */
      function readLine(direction, index) {
        var values = [];
        for (var offset = 0; offset < SIZE; offset += 1) {
          var pos = getPosition(direction, index, offset);
          values.push(grid[pos.y][pos.x]);
        }
        return { values: values };
      }

      /** Translate a directional line index and offset into board coordinates. */
      function getPosition(direction, index, offset) {
        if (direction === "left") {
          return { x: offset, y: index };
        }
        if (direction === "right") {
          return { x: SIZE - 1 - offset, y: index };
        }
        if (direction === "up") {
          return { x: index, y: offset };
        }
        return { x: index, y: SIZE - 1 - offset };
      }

      /** Check every possible move to decide if the game has ended. */
      function isGameOver() {
        for (var y = 0; y < SIZE; y += 1) {
          for (var x = 0; x < SIZE; x += 1) {
            if (grid[y][x] === null) {
              return false;
            }
            if (x < SIZE - 1 && grid[y][x + 1] && grid[y][x].value === grid[y][x + 1].value) {
              return false;
            }
            if (y < SIZE - 1 && grid[y + 1][x] && grid[y][x].value === grid[y + 1][x].value) {
              return false;
            }
          }
        }
        return true;
      }

      /** Update visible score and persistent best score. */
      function updateScore() {
        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          try {
            localStorage.setItem(STORAGE_KEY, String(bestScore));
          } catch (error) {
            // Storage can be unavailable in restricted embedded webviews.
          }
        }
        bestScoreEl.textContent = bestScore;
      }

      function readBestScore() {
        try {
          return Number(localStorage.getItem(STORAGE_KEY)) || 0;
        } catch (error) {
          return 0;
        }
      }

      function containsValue(value) {
        for (var y = 0; y < SIZE; y += 1) {
          for (var x = 0; x < SIZE; x += 1) {
            if (grid[y][x] && grid[y][x].value === value) {
              return true;
            }
          }
        }
        return false;
      }

      function showModal(modal) {
        locked = true;
        modal.classList.add("show");
      }

      function closeModals() {
        gameOverModal.classList.remove("show");
        winModal.classList.remove("show");
      }

      function beginGame() {
        gameReady = true;
        introScreen.classList.add("hide");
        startGame();
      }

      function showStartRipple(event) {
        var rect = startGameButton.getBoundingClientRect();
        var ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        startGameButton.appendChild(ripple);
        ripple.addEventListener("animationend", function () {
          ripple.remove();
        }, { once: true });
      }

      /** Convert touch movement into a swipe direction. */
      function handleSwipe(endX, endY) {
        var dx = endX - touchStartX;
        var dy = endY - touchStartY;
        var absX = Math.abs(dx);
        var absY = Math.abs(dy);

        if (Math.max(absX, absY) < 28) {
          return false;
        }

        if (absX > absY) {
          move(dx > 0 ? "right" : "left");
        } else {
          move(dy > 0 ? "down" : "up");
        }

        return true;
      }

      /** Let a tap on the board move toward the tapped side. */
      function handleBoardTap(clientX, clientY) {
        var rect = board.getBoundingClientRect();
        var x = clientX - rect.left;
        var y = clientY - rect.top;
        var dx = x - rect.width / 2;
        var dy = y - rect.height / 2;

        if (Math.abs(dx) > Math.abs(dy)) {
          move(dx > 0 ? "right" : "left");
        } else {
          move(dy > 0 ? "down" : "up");
        }
      }

      board.addEventListener("touchstart", function (event) {
        if (!event.touches.length) {
          return;
        }
        touchStartX = event.touches[0].clientX;
        touchStartY = event.touches[0].clientY;
      }, { passive: true });

      board.addEventListener("touchmove", function (event) {
        event.preventDefault();
      }, { passive: false });

      board.addEventListener("touchend", function (event) {
        if (!event.changedTouches.length) {
          return;
        }
        if (handleSwipe(event.changedTouches[0].clientX, event.changedTouches[0].clientY)) {
          suppressClickUntil = Date.now() + 350;
        }
      }, { passive: true });

      board.addEventListener("click", function (event) {
        if (Date.now() < suppressClickUntil) {
          return;
        }
        handleBoardTap(event.clientX, event.clientY);
      });

      document.addEventListener("keydown", function (event) {
        var keys = {
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down"
        };
        if (keys[event.key]) {
          event.preventDefault();
          move(keys[event.key]);
        }
      });

      restartButton.addEventListener("click", startGame);
      startGameButton.addEventListener("pointerdown", showStartRipple);
      startGameButton.addEventListener("click", beginGame);

      document.querySelectorAll("[data-restart]").forEach(function (button) {
        button.addEventListener("click", startGame);
      });

      document.querySelectorAll("[data-direction]").forEach(function (button) {
        button.addEventListener("click", function () {
          move(button.getAttribute("data-direction"));
        });
      });

      startGame();
    }());
  </script>
</body>
</html>
